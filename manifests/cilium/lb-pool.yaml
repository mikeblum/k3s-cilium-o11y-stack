# CiliumLoadBalancerIPPool — edit the CIDR to match a free range on your LAN.
# Example: if your NUC is 192.168.1.10, use something like 192.168.1.200/29
apiVersion: "cilium.io/v2alpha1"
kind: CiliumLoadBalancerIPPool
metadata:
  name: lan-pool
spec:
  blocks:
    - cidr: "192.168.1.200/29"   # <-- customize to your LAN
