apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-config
  namespace: observability
data:
  # Tune memory for NUC (adjust max_server_memory_usage to ~50% of RAM)
  config.xml: |
    <?xml version="1.0"?>
    <clickhouse>
      <max_server_memory_usage_to_ram_ratio>0.5</max_server_memory_usage_to_ram_ratio>
      <max_concurrent_queries>100</max_concurrent_queries>
      <listen_host>0.0.0.0</listen_host>
      <!-- OpenTelemetry HTTP endpoint for native OTLP ingest -->
      <opentelemetry_span_log>
        <engine>
          ENGINE = MergeTree
          PARTITION BY toYYYYMM(start_time_us)
          ORDER BY (finish_date, cityHash64(trace_id))
          TTL finish_date + toIntervalDay(3)
          SETTINGS index_granularity = 8192
        </engine>
      </opentelemetry_span_log>
    </clickhouse>
  users.xml: |
    <?xml version="1.0"?>
    <clickhouse>
      <users>
        <default>
          <password></password>
          <networks>
            <ip>::/0</ip>
          </networks>
          <profile>default</profile>
          <quota>default</quota>
          <access_management>1</access_management>
        </default>
      </users>
    </clickhouse>
