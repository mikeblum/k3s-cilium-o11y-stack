apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: observability
  labels:
    app: clickhouse
    app.kubernetes.io/part-of: clickstack
spec:
  selector:
    app: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
  clusterIP: None  # headless — StatefulSet DNS
