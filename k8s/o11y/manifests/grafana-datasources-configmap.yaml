apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
  labels:
    grafana_datasource: "1"   # picked up by Grafana sidecar
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus-server.observability.svc.cluster.local
        isDefault: false
        # Cilium pre-built dashboards reference this datasource by uid "prometheus" —
        # do not rename it.

      - name: ClickHouse
        type: grafana-clickhouse-datasource
        uid: clickhouse
        isDefault: true
        jsonData:
          host: clickhouse.observability.svc.cluster.local
          port: 9000
          protocol: native
          defaultDatabase: otel
          logs:
            defaultDatabase: otel
            defaultTable: otel_logs
            otelEnabled: true
            otelVersion: latest
          traces:
            defaultDatabase: otel
            defaultTable: otel_traces
            otelEnabled: true
            durationUnit: nanoseconds
