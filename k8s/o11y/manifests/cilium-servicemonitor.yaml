# NOT used in the default install — requires the Prometheus Operator
# (kube-prometheus-stack), which this stack does not deploy.
#
# cilium-operator is instead scraped by Alloy directly in alloy-configmap.yaml.
# cilium-agent (:9962) and hubble (:9965) are also scraped by Alloy via localhost.
#
# Keep this file for reference only — apply manually if you add kube-prometheus-stack.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cilium-operator
  namespace: o11y
  labels:
    release: prometheus   # must match prometheus.serviceMonitorSelector in values/prometheus.yaml
spec:
  namespaceSelector:
    matchNames: [kube-system]
  selector:
    matchLabels:
      io.cilium/app: operator
  endpoints:
    - port: prometheus
      interval: 30s
      path: /metrics
