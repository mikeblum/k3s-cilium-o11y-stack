---
# Replaces the pascaliske chart's default-user.xml to:
#   1. Lock the 'default' user back to localhost
#   2. Create a 'grafana' user (read-only, no password) for the Grafana datasource
#   3. Create an 'otel_writer' user (INSERT + CREATE TABLE, no password) for ch-writer
#
# No passwords — the cluster is LAN-only; Tailscale is the auth boundary, the same
# trust model as anonymous-admin Grafana. The user split exists to enforce permissions
# (grafana can't write; otel_writer can't read arbitrary data), not authentication.
#
# ClickHouse's built-in 'readonly' profile restricts the grafana user to SELECT only.
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-users-override
  namespace: o11y
data:
  00-network-override.xml: |
    <clickhouse>
      <users>
        <!-- Lock default user back to localhost — dedicated users handle all app access -->
        <default>
          <networks>
            <ip>127.0.0.1</ip>
            <ip>::1</ip>
          </networks>
        </default>

        <!-- Grafana datasource: read-only across the otel database -->
        <grafana>
          <password></password>
          <networks><ip>::/0</ip></networks>
          <profile>readonly</profile>
          <quota>default</quota>
        </grafana>

        <!-- ch-writer OTLP ingest: INSERT + CREATE TABLE on otel.* -->
        <otel_writer>
          <password></password>
          <networks><ip>::/0</ip></networks>
          <profile>default</profile>
          <quota>default</quota>
          <databases>
            <otel/>
          </databases>
        </otel_writer>
      </users>
    </clickhouse>
