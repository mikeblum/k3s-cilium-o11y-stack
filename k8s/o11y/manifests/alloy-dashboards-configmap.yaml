  alloy-resources.json: |
    {
       "annotations": {
          "list": [
             {
                "datasource": "$loki_datasource",
                "enable": true,
                "expr": "{cluster=~\"$cluster\", container=\"kube-diff-logger\"} | json | namespace_extracted=\"alloy\" | name_extracted=~\"alloy.*\"",
                "iconColor": "rgba(0, 211, 255, 1)",
                "instant": false,
                "name": "Deployments",
                "titleFormat": "{{cluster}}/{{namespace}}"
             }
          ]
       },
       "graphTooltip": 1,
       "links": [
          {
             "asDropdown": true,
             "icon": "external link",
             "includeVars": true,
             "keepTime": true,
             "tags": [
                "alloy-mixin"
             ],
             "targetBlank": false,
             "title": "Dashboards",
             "type": "dashboards"
          }
       ],
       "panels": [
          {
             "datasource": "${datasource}",
             "description": "CPU usage of the Alloy process relative to 1 CPU core.\n\nFor example, 100% means using one entire CPU core.\n",
             "fieldConfig": {
                "defaults": {
                   "unit": "percentunit"
                }
             },
             "gridPos": {
                "h": 8,
                "w": 12,
                "x": 0,
                "y": 0
             },
             "targets": [
                {
                   "datasource": "${datasource}",
                   "expr": "sum by(${groupby}) (rate(alloy_resources_process_cpu_seconds_total{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\"}[$__rate_interval]))\n",
                   "instant": false,
                   "legendFormat": "__auto",
                   "range": true
                }
             ],
             "title": "CPU usage",
             "type": "timeseries"
          },
          {
             "datasource": "${datasource}",
             "description": "Resident memory size of the Alloy process.\n",
             "fieldConfig": {
                "defaults": {
                   "unit": "decbytes"
                }
             },
             "gridPos": {
                "h": 8,
                "w": 12,
                "x": 12,
                "y": 0
             },
             "targets": [
                {
                   "datasource": "${datasource}",
                   "expr": "sum by(${groupby}) (alloy_resources_process_resident_memory_bytes{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\"})\n",
                   "instant": false,
                   "legendFormat": "__auto",
                   "range": true
                }
             ],
             "title": "Memory (RSS)",
             "type": "timeseries"
          },
          {
             "datasource": "${datasource}",
             "description": "Rate at which the Alloy process performs garbage collections.\n",
             "fieldConfig": {
                "defaults": {
                   "custom": {
                      "drawStyle": "points",
                      "pointSize": 3
                   },
                   "unit": "ops"
                }
             },
             "gridPos": {
                "h": 8,
                "w": 8,
                "x": 0,
                "y": 8
             },
             "targets": [
                {
                   "datasource": "${datasource}",
                   "expr": "sum by(${groupby}) (\n  rate(go_gc_duration_seconds_count{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\"}[5m])\n  and on(instance)\n  alloy_build_info{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\"}\n)\n",
                   "instant": false,
                   "legendFormat": "__auto",
                   "range": true
                }
             ],
             "title": "Garbage collections",
             "type": "timeseries"
          },
          {
             "datasource": "${datasource}",
             "description": "Number of goroutines which are running in parallel. An infinitely\ngrowing number of these indicates a goroutine leak.\n",
             "fieldConfig": {
                "defaults": {
                   "unit": "none"
                }
             },
             "gridPos": {
                "h": 8,
                "w": 8,
                "x": 8,
                "y": 8
             },
             "targets": [
                {
                   "datasource": "${datasource}",
                   "expr": "sum by(${groupby}) (\n  go_goroutines{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\"}\n  and on(instance)\n  alloy_build_info{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\"}\n)\n",
                   "instant": false,
                   "legendFormat": "__auto",
                   "range": true
                }
             ],
             "title": "Goroutines",
             "type": "timeseries"
          },
          {
             "datasource": "${datasource}",
             "description": "Heap memory currently in use by the Alloy process.\n",
             "fieldConfig": {
                "defaults": {
                   "unit": "decbytes"
                }
             },
             "gridPos": {
                "h": 8,
                "w": 8,
                "x": 16,
                "y": 8
             },
             "targets": [
                {
                   "datasource": "${datasource}",
                   "expr": "sum by(${groupby}) (\n  go_memstats_heap_inuse_bytes{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\"}\n  and on(instance)\n  alloy_build_info{cluster=~\"$cluster\", namespace=~\"$namespace\", job=~\"$job\", instance=~\"$instance\"}\n)\n",
                   "instant": false,
                   "legendFormat": "__auto",
                   "range": true
                }
             ],
             "title": "Memory (heap in use)",
             "type": "timeseries"
          },
          {
             "datasource": "${datasource}",
             "description": "Rate of data received across all network interfaces for the machine\nAlloy is running on.\n\nData shown here is across all running processes and not exclusive to\nthe running Alloy process.\n",
             "fieldConfig": {
                "defaults": {
                   "custom": {
                      "fillOpacity": 30,
                      "gradientMode": "none",
                      "stacking": {
                         "mode": "normal"
                      }
                   },
                   "unit": "Bps"
                }
             },
             "gridPos": {
                "h": 8,
                "w": 12,
                "x": 0,
                "y": 16
             },
             "targets": [
