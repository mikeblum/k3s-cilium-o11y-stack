# Grafana 13.0.1 — Grafana 13 stable (security-patched)
#
# Auth: login form disabled; anonymous access granted as Admin.
# Tailscale membership is the auth boundary — only tailnet members can
# reach this instance, so a second login prompt adds friction with no
# security benefit.

image:
  tag: "13.0.1"

grafana.ini:
  analytics:
    check_for_updates: false      # avoid outbound call on every load; this is an air-gapped homelab
    check_for_plugin_updates: false
    reporting_enabled: false
  auth.anonymous:
    enabled: true
    org_role: Viewer              # Grafana 13: Admin is no longer supported for anonymous; use auto_assign_org_role below
  users:
    auto_assign_org_role: Admin   # all users (including anonymous) get Admin role in the default org
  auth:
    disable_login_form: true      # Tailscale is the auth boundary; no second login needed

plugins:
  - grafana-clickhouse-datasource 4.17.0   # pinned — bump alongside chart upgrades

sidecar:
  datasources:
    enabled: true   # auto-loads datasources from ConfigMaps with grafana_datasource=1 label

persistence:
  enabled: true
  size: 5Gi

initChownData:
  enabled: false  # PVC already owned by uid 472 from initial install; chown fails on re-deploy

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: cilium
        folder: Cilium
        type: file
        disableDeletion: false
        allowUiUpdates: true   # allow saving tweaks to provisioned dashboards in this homelab
        options:
          path: /var/lib/grafana/dashboards/cilium
      - name: otel
        folder: OTel
        type: file
        disableDeletion: false
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards/otel
      - name: clickhouse
        folder: ClickHouse
        type: file
        disableDeletion: false
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards/clickhouse

# Dashboards downloaded at pod startup by the download-dashboards init container.
# Top-level key must match a provider name above; each entry maps to one JSON file
# at /var/lib/grafana/dashboards/<provider>/<key>.json.
#
# OTel and ClickHouse dashboards come from dashboardsConfigMaps below (no grafana.com gnetId).
dashboards:
  cilium:
    # Cilium 1.12 dashboards — metric names are stable through 1.17.
    # Published by Isovalent: https://grafana.com/orgs/isovalent/dashboards
    agent-metrics:
      gnetId: 16611         # Cilium v1.12 Agent Metrics
      datasource:
        - name: DS_PROMETHEUS
          value: prometheus
    operator-metrics:
      gnetId: 16612         # Cilium v1.12 Operator Metrics
      datasource:
        - name: DS_PROMETHEUS
          value: prometheus
    hubble-metrics:
      gnetId: 16613         # Cilium v1.12 Hubble Metrics
      datasource:
        - name: DS_PROMETHEUS
          value: prometheus
    policy-verdicts:
      gnetId: 18015         # Cilium Policy Verdicts (version-agnostic)
      datasource:
        - name: DS_PROMETHEUS
          value: prometheus

  # otel provider dashboards come from the alloy-dashboards ConfigMap below —
  # no gnetId entries here.

# ConfigMap-backed dashboards (no grafana.com gnetId).
# Key = provider name; value = ConfigMap name in the same namespace.
# The helm chart mounts the ConfigMap at /var/lib/grafana/dashboards/<provider>/.
dashboardsConfigMaps:
  # Source: https://github.com/grafana/alloy/tree/main/operations/alloy-mixin/rendered/dashboards
  otel: alloy-dashboards
  # Sources (see manifests/clickhouse-dashboards-configmap.yaml for patches applied):
  #   otel.json             — grafana/clickhouse-datasource v4.17.0 (opentelemetry-clickhouse.json)
  #   cluster-analysis.json
  #   data-analysis.json    — ClickHouse/clickhouse-grafana-datasource @ 8f09a42301d5
  #   query-analysis.json
  clickhouse: clickhouse-dashboards
