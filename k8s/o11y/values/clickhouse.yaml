# pascaliske/clickhouse chart values
# chart: https://charts.pascaliske.dev  (uses official clickhouse/clickhouse-server image)
# Single-node — no Keeper/ZooKeeper needed for homelab use.

image:
  repository: clickhouse/clickhouse-server
  tag: "25.4-alpine"
  pullPolicy: IfNotPresent

controller:
  replicas: 1

# ClickHouse creates CLICKHOUSE_DB on first start via the official entrypoint.
# Default user has no password and full access — fine for LAN-only homelab.
env:
  - name: TZ
    value: UTC
  - name: CLICKHOUSE_DB
    value: otel

ports:
  rest:
    enabled: true
    port: 8123   # HTTP interface (used by Grafana datasource)
  rpc:
    enabled: true
    port: 9000   # Native TCP protocol (used by ch-writer + Grafana datasource)

persistentVolumeClaim:
  create: true
  mountPath: /var/lib/clickhouse
  accessMode: ReadWriteOnce
  size: 50Gi
  storageClassName: ""   # uses k3s default (local-path)

resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 4Gi
    cpu: 2
