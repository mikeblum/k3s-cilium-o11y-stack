# Allows HTTPRoutes in envoy-gateway-system to reference Services in otel-demo.
# Mirrors the gateway-to-o11y grant in k8s/o11y/manifests/reference-grants.yaml.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: gateway-to-otel-demo
  namespace: otel-demo
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: envoy-gateway-system
  to:
    - group: ""
      kind: Service
