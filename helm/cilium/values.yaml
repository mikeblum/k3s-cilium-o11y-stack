# Cilium Helm values — k3s single-node setup
# Requires: --set k8sServiceHost=<NODE_IP> at install time
#           (see infra/cilium/install.sh)

kubeProxyReplacement: true
# k8sServiceHost and k8sServicePort are passed via --set at install time

operator:
  replicas: 1  # single-node

# L2 announcements so LoadBalancer services get a real LAN IP
l2announcements:
  enabled: true
externalIPs:
  enabled: true

# Built-in Envoy proxy for L7 policy + Gateway API
envoy:
  enabled: true

gatewayAPI:
  enabled: true

# Hubble — network observability
hubble:
  enabled: true
  relay:
    enabled: true
    prometheus:
      enabled: true
      port: 9965
  ui:
    enabled: true
  metrics:
    enableOpenMetrics: true
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - port-distribution
      - icmp
      - "httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction"

# Cilium agent Prometheus metrics
prometheus:
  enabled: true
  port: 9962

# Cilium operator Prometheus metrics
operator:
  replicas: 1
  prometheus:
    enabled: true
    port: 9963

# Enable Bandwidth Manager (eBPF-based traffic shaping)
bandwidthManager:
  enabled: true

# Host firewall for node-level policies
hostFirewall:
  enabled: false  # enable once policies are defined
